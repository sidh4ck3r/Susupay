<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f8fafc",
                        "background-dark": "#020617",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }</script>
<style>
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 183, 127, 0.2);
        }
        .radio-dot {
            --radio-dot-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(16,183,127)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3ccircle cx=%278%27 cy=%278%27 r=%273%27/%3e%3c/svg%3e');
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<!-- Background Dashboard Blur (Decorative) -->
<div class="absolute inset-0 z-0 opacity-50 blur-3xl pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/5 rounded-full"></div>
</div>
<!-- Main Dashboard UI Underneath (Mockup) -->
<div class="relative z-10 p-8 grid grid-cols-12 gap-6 filter blur-md">
<div class="col-span-12 flex justify-between items-center mb-8">
<div class="h-10 w-48 bg-slate-800/50 rounded-lg"></div>
<div class="h-10 w-10 bg-slate-800/50 rounded-full"></div>
</div>
<div class="col-span-3 h-64 bg-slate-800/30 rounded-xl border border-slate-700/50"></div>
<div class="col-span-3 h-64 bg-slate-800/30 rounded-xl border border-slate-700/50"></div>
<div class="col-span-3 h-64 bg-slate-800/30 rounded-xl border border-slate-700/50"></div>
<div class="col-span-3 h-64 bg-slate-800/30 rounded-xl border border-slate-700/50"></div>
<div class="col-span-8 h-96 bg-slate-800/30 rounded-xl border border-slate-700/50"></div>
<div class="col-span-4 h-96 bg-slate-800/30 rounded-xl border border-slate-700/50"></div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 p-4">
<div class="glass-panel w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col radio-dot">
<!-- Header -->
<div class="p-6 border-b border-primary/20 flex justify-between items-center">
<div>
<h2 class="text-2xl font-bold text-slate-100">Generate Financial Report</h2>
<p class="text-slate-400 text-sm">Configure your premium financial data export</p>
</div>
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-6 space-y-8 overflow-y-auto max-h-[80vh]">
<!-- Report Type Selection -->
<section>
<label class="block text-sm font-semibold text-primary/80 uppercase tracking-wider mb-4">Report Type</label>
<div class="grid grid-cols-1 md:grid-cols-2 gap-3">
<label class="flex items-center gap-4 rounded-xl border border-primary/20 bg-primary/5 p-4 cursor-pointer hover:border-primary/50 transition-all group">
<input checked="" class="h-5 w-5 border-2 border-primary/30 bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="report_type" type="radio"/>
<div class="flex flex-col">
<span class="text-slate-100 font-medium group-hover:text-primary">Collection Summary</span>
<span class="text-slate-400 text-xs">Summary of all daily collections</span>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-primary/10 bg-white/5 p-4 cursor-pointer hover:border-primary/50 transition-all group">
<input class="h-5 w-5 border-2 border-primary/30 bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="report_type" type="radio"/>
<div class="flex flex-col">
<span class="text-slate-100 font-medium group-hover:text-primary">Withdrawal Audit</span>
<span class="text-slate-400 text-xs">Audit trail for all fund withdrawals</span>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-primary/10 bg-white/5 p-4 cursor-pointer hover:border-primary/50 transition-all group">
<input class="h-5 w-5 border-2 border-primary/30 bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="report_type" type="radio"/>
<div class="flex flex-col">
<span class="text-slate-100 font-medium group-hover:text-primary">Customer Growth</span>
<span class="text-slate-400 text-xs">Analysis of new acquisitions</span>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-primary/10 bg-white/5 p-4 cursor-pointer hover:border-primary/50 transition-all group">
<input class="h-5 w-5 border-2 border-primary/30 bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0" name="report_type" type="radio"/>
<div class="flex flex-col">
<span class="text-slate-100 font-medium group-hover:text-primary">Commission Report</span>
<span class="text-slate-400 text-xs">Detailed breakdown of earnings</span>
</div>
</label>
</div>
</section>
<!-- Date Range Picker -->
<section>
<label class="block text-sm font-semibold text-primary/80 uppercase tracking-wider mb-4">Date Range</label>
<div class="flex flex-col md:flex-row gap-4">
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/60">calendar_today</span>
<input class="w-full pl-10 pr-4 py-3 bg-white/5 border border-primary/20 rounded-lg text-slate-100 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/40" placeholder="Start Date (YYYY-MM-DD)" type="text"/>
</div>
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/60">event</span>
<input class="w-full pl-10 pr-4 py-3 bg-white/5 border border-primary/20 rounded-lg text-slate-100 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/40" placeholder="End Date (YYYY-MM-DD)" type="text"/>
</div>
</div>
</section>
<!-- Export Format -->
<section>
<label class="block text-sm font-semibold text-primary/80 uppercase tracking-wider mb-4">Export Format</label>
<div class="flex gap-3">
<button class="flex-1 py-2 px-4 rounded-lg bg-primary font-bold flex items-center justify-center gap-2 text-white">
<span class="material-symbols-outlined text-xl">picture_as_pdf</span> PDF
                        </button>
<button class="flex-1 py-2 px-4 rounded-lg bg-white/5 border border-primary/20 text-slate-100 font-medium hover:bg-primary/10 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl text-primary/60">csv</span> CSV
                        </button>
<button class="flex-1 py-2 px-4 rounded-lg bg-white/5 border border-primary/20 text-slate-100 font-medium hover:bg-primary/10 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl text-primary/60">table_chart</span> Excel
                        </button>
</div>
</section>
<!-- Advanced Options -->
<section>
<label class="block text-sm font-semibold text-primary/80 uppercase tracking-wider mb-4">Advanced Options</label>
<div class="space-y-4">
<div class="flex items-center justify-between p-3 rounded-lg bg-white/5 border border-primary/10">
<div class="flex flex-col">
<span class="text-slate-100 font-medium">Include Detailed Transaction Log</span>
<span class="text-slate-400 text-xs">Append full raw data at the end of the report</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<div class="flex items-center justify-between p-3 rounded-lg bg-white/5 border border-primary/10">
<div class="flex flex-col">
<span class="text-slate-100 font-medium">Group by Collector</span>
<span class="text-slate-400 text-xs">Organize data based on individual staff metrics</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
</div>
<!-- Footer Actions -->
<div class="p-6 border-t border-primary/20 bg-primary/5 flex gap-4">
<button class="flex-1 py-3 px-6 rounded-lg border border-primary/30 text-primary font-semibold hover:bg-primary/10 transition-colors">
                    Cancel
                </button>
<button class="flex-[2] py-3 px-6 rounded-lg bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">analytics</span>
                    Generate Report
                </button>
</div>
</div>
</div>
</body></html>
