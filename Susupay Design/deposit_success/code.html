<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#eecd2b",
                        "background-light": "#f8f8f6",
                        "background-dark": "#221f10",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .success-glow {
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-white/10 px-6 md:px-20 py-4 glass-panel sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-background-dark">
<span class="material-symbols-outlined text-2xl font-bold">payments</span>
</div>
<h2 class="text-slate-100 text-xl font-bold leading-tight tracking-tight">SusuPay</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex size-10 cursor-pointer items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors text-slate-100">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="size-10 rounded-full bg-primary/20 border border-primary/30 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12 max-w-2xl mx-auto w-full">
<!-- Success Icon -->
<div class="mb-8 relative">
<div class="absolute inset-0 bg-green-500/20 blur-3xl rounded-full"></div>
<div class="relative size-24 md:size-32 bg-green-500/10 border-2 border-green-500/50 rounded-full flex items-center justify-center success-glow">
<span class="material-symbols-outlined text-green-500 text-5xl md:text-7xl font-bold">check_circle</span>
</div>
</div>
<div class="text-center mb-10">
<h1 class="text-slate-100 text-3xl md:text-4xl font-bold mb-2">Deposit Successful</h1>
<p class="text-slate-400">Your funds are now available in your wallet.</p>
</div>
<!-- Transaction Summary Card -->
<div class="w-full glass-panel rounded-2xl p-6 md:p-8 space-y-6">
<div class="flex justify-between items-center border-b border-white/5 pb-4">
<span class="text-slate-400 font-medium">Amount</span>
<span class="text-primary text-2xl font-bold">GHS 500.00</span>
</div>
<div class="grid gap-4">
<div class="flex justify-between items-center">
<span class="text-slate-400 text-sm">Transaction ID</span>
<span class="text-slate-100 font-mono text-sm">#TXN-982103</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-400 text-sm">Date</span>
<span class="text-slate-100 text-sm">Oct 24, 2023 • 14:20 PM</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-400 text-sm">Payment Method</span>
<span class="text-slate-100 text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-xs">account_balance_wallet</span>
                                Mobile Money
                            </span>
</div>
<div class="flex justify-between items-center pt-2 border-t border-white/5">
<span class="text-slate-400 text-sm font-semibold">New Balance</span>
<span class="text-slate-100 font-bold">GHS 1,250.50</span>
</div>
</div>
</div>
<!-- Receipt Graphic Element -->
<div class="w-full px-6 -mt-2">
<div class="h-4 glass-panel border-t-0 rounded-b-xl opacity-50 mx-4"></div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4 mt-12">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-background-dark rounded-xl font-bold text-lg flex items-center justify-center transition-all transform active:scale-[0.98]">
                        Return to Dashboard
                    </button>
<button class="w-full h-14 glass-panel hover:bg-white/10 text-slate-100 rounded-xl font-semibold flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-xl">download</span>
                        Download Receipt
                    </button>
</div>
<!-- Footer Support -->
<div class="mt-8 text-center">
<p class="text-slate-500 text-sm">
                        Having issues? <a class="text-primary hover:underline" href="#">Contact Support</a>
</p>
</div>
</main>
<!-- Bottom Background Glow -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[500px] h-[300px] bg-primary/10 blur-[120px] rounded-full -z-10 pointer-events-none"></div>
</div>
</div>
</body></html>
