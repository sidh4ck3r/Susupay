<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "emerald-glass": "#10b981",
                        "sapphire-glass": "#3b82f6",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-morphism {
            background: rgba(34, 22, 16, 0.8);
            border: 1px solid rgba(236, 91, 19, 0.1);
        }
        .emerald-sapphire-gradient {
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen relative">
<!-- Blurred Background Dashboard Content -->
<div class="fixed inset-0 z-0 overflow-hidden blur-[8px] opacity-40 select-none pointer-events-none">
<div class="layout-container flex h-full grow flex-col">
<div class="px-10 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-3">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-primary">auto_awesome</span>
<h2 class="text-lg font-bold">SusuPay</h2>
</div>
</header>
<div class="flex flex-col gap-8 mt-10">
<div class="h-32 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="grid grid-cols-3 gap-4">
<div class="h-24 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-24 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-24 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
<div class="h-64 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
<!-- Notification Modal -->
<div class="glass-morphism w-full max-w-md rounded-xl overflow-hidden shadow-2xl border border-white/20 dark:border-primary/20">
<!-- Modal Header with Gradient Accent -->
<div class="emerald-sapphire-gradient h-2 w-full"></div>
<div class="p-8">
<!-- Icon and Title -->
<div class="flex flex-col items-center text-center mb-8">
<div class="w-20 h-20 rounded-full emerald-sapphire-gradient flex items-center justify-center mb-4 shadow-lg shadow-emerald-500/20">
<span class="material-symbols-outlined text-white text-4xl">task_alt</span>
</div>
<h2 class="text-2xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Export Ready</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm mt-1">Your data is prepared and ready for download.</p>
</div>
<!-- File Information Card -->
<div class="bg-white/50 dark:bg-slate-900/50 rounded-xl p-4 border border-slate-200 dark:border-slate-800 mb-6">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400">description</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-sm font-bold text-slate-900 dark:text-slate-100 truncate">Audit_History_Q4.csv</p>
<div class="flex items-center gap-3 mt-0.5">
<span class="text-xs text-slate-500 dark:text-slate-400">Size: 1.2 MB</span>
<span class="w-1 h-1 bg-slate-300 dark:bg-slate-600 rounded-full"></span>
<span class="text-xs text-slate-500 dark:text-slate-400">Format: CSV</span>
</div>
</div>
</div>
</div>
<!-- Expiration Warning -->
<div class="flex items-start gap-3 p-3 mb-8 rounded-lg bg-orange-50 dark:bg-orange-900/20 border border-orange-100 dark:border-orange-900/30">
<span class="material-symbols-outlined text-orange-600 dark:text-orange-400 text-sm mt-0.5">schedule</span>
<p class="text-xs leading-relaxed text-orange-800 dark:text-orange-300">
<span class="font-bold">Security Notice:</span> This secure link expires in 15 minutes (at 14:45 GMT). Please download your file promptly.
                    </p>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full h-12 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-emerald-500/25 active:scale-[0.98]">
<span class="material-symbols-outlined text-xl">download</span>
                        Download Now
                    </button>
<button class="w-full h-12 flex items-center justify-center gap-2 text-slate-600 dark:text-slate-400 font-medium hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">content_copy</span>
                        Copy Download Link
                    </button>
</div>
<!-- Secondary Close/Dismiss -->
<div class="mt-6 pt-6 border-t border-slate-200 dark:border-slate-800 text-center">
<button class="text-xs font-semibold text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 uppercase tracking-widest">
                        Dismiss
                    </button>
</div>
</div>
</div>
</div>
</body></html>
