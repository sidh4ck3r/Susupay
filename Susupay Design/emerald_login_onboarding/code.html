<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SusuPay - Emerald &amp; Sapphire Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Emerald Green
                        "secondary": "#3b82f6", // Sapphire Blue
                        "background-light": "#f8fafd",
                        "background-dark": "#020617", // Deep Navy/Slate
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(16, 185, 129, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .emerald-glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        .sapphire-gradient {
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Background Accents -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="layout-container flex h-full grow flex-col z-10">
<div class="px-6 md:px-20 lg:px-40 flex flex-1 justify-center py-10">
<div class="layout-content-container flex flex-col max-w-[480px] flex-1">
<!-- Top Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-white/10 px-4 py-4 mb-8 glass-panel rounded-xl">
<div class="flex items-center gap-3">
<div class="size-8 sapphire-gradient rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">payments</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">SusuPay</h2>
</div>
<button class="flex size-10 items-center justify-center rounded-xl bg-slate-200 dark:bg-white/5 hover:bg-primary/20 transition-colors text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<!-- Hero Illustration Area -->
<div class="@container mb-8">
<div class="w-full relative h-[200px] overflow-hidden rounded-2xl glass-panel flex items-center justify-center border border-white/5">
<div class="absolute inset-0 sapphire-gradient opacity-20"></div>
<div class="z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-7xl text-primary mb-2">shield_lock</span>
<div class="h-1 w-24 bg-primary rounded-full opacity-50"></div>
</div>
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-background-dark to-transparent"></div>
</div>
</div>
<!-- Welcome Text -->
<div class="flex flex-col gap-2 px-2 mb-8">
<h1 class="text-slate-900 dark:text-white text-4xl font-black leading-tight tracking-tight">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">Securely access your premium SusuPay account</p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="px-2 text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Identification</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl h-14 pl-12 pr-4 text-slate-900 dark:text-white placeholder:text-slate-400 transition-all outline-none" placeholder="Email or Phone Number" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Password</label>
<a class="text-primary text-xs font-bold hover:underline" href="#">Forgot?</a>
</div>
<div class="flex w-full items-stretch relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl h-14 pl-12 pr-14 text-slate-900 dark:text-white placeholder:text-slate-400 transition-all outline-none" placeholder="Enter your secure password" type="password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-secondary">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-emerald-500 text-white font-bold rounded-xl emerald-glow transition-all flex items-center justify-center gap-2 mt-4">
<span class="material-symbols-outlined">login</span>
                        Sign In to Dashboard
                    </button>
<!-- Secondary Actions -->
<div class="flex items-center gap-4 py-4">
<div class="h-px grow bg-slate-200 dark:bg-white/10"></div>
<span class="text-slate-400 text-xs font-medium uppercase tracking-widest">or continue with</span>
<div class="h-px grow bg-slate-200 dark:bg-white/10"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex h-12 items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-white/10 hover:bg-slate-50 dark:hover:bg-white/5 text-slate-700 dark:text-white transition-colors">
<span class="material-symbols-outlined text-secondary">fingerprint</span>
<span class="text-sm font-semibold">Biometrics</span>
</button>
<button class="flex h-12 items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-white/10 hover:bg-slate-50 dark:hover:bg-white/5 text-slate-700 dark:text-white transition-colors">
<span class="material-symbols-outlined text-secondary">qr_code_2</span>
<span class="text-sm font-semibold">QR Code</span>
</button>
</div>
<p class="text-center text-slate-500 dark:text-slate-400 text-sm mt-6">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Request Access</a>
</p>
</div>
<!-- Footer Copyright -->
<footer class="mt-auto pt-10 pb-6 text-center">
<p class="text-slate-400 dark:text-slate-600 text-[10px] uppercase tracking-widest">
                        © 2024 SusuPay FinTech Solutions. Secure encrypted connection.
                    </p>
</footer>
</div>
</div>
</div>
</div>
</body></html>
